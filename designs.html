<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معرض التصاميم - متجر لمسة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .designs-section {
            padding: 60px 20px;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .designs-header {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInUp 0.8s ease-out;
        }

        .designs-header h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            color: var(--primary-brown);
            margin-bottom: 10px;
        }

        .designs-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 100%;
            animation: fadeInUp 1s ease-out 0.3s both;
            margin-bottom: 50px;
        }

        .design-card {
            background: var(--white);
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid var(--accent-pink);
            box-shadow: 0 10px 25px rgba(74, 52, 39, 0.05);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .design-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 15px 35px rgba(74, 52, 39, 0.15);
            border-color: var(--gold-subtle);
        }

        .design-card img, .design-card video {
            width: 100%;
            aspect-ratio: 9 / 16; 
            display: block;
            transition: 0.5s;
            object-fit: cover;
        }

        .design-info {
            padding: 10px;
            text-align: center;
            background: var(--white);
            border-top: 1px solid var(--bg-color);
            margin-top: auto; 
        }

        .design-title {
            font-weight: 700;
            color: var(--primary-brown);
            font-size: 0.9rem;
        }

        /* تنسيق الصفحة الداخلية للمجموعة */
        #groupPage {
            display: none;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        .back-btn {
            background: var(--primary-brown);
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            font-weight: bold;
            margin-bottom: 30px;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--accent-pink); }

        /* نافذة التكبير الكبيرة */
        .image-viewer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 3000;
            cursor: zoom-out;
            backdrop-filter: blur(8px);
        }

        .image-viewer-overlay img, .image-viewer-overlay video {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        @media (min-width: 768px) {
            .designs-container {
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                gap: 25px;
            }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">مَتْجَرُ <span>لَمْسَةٍ</span></div>
    </nav>

    <div id="mainGallery" class="designs-section">
        <div class="designs-header">
            <h1>مَعْرِضُ أَعْمَالِي</h1>
            <p>اختر القسم لتصفح التصاميم بصورة كاملة.</p>
        </div>

        <div class="designs-header"><h1>تَصَامِيمُ الصُّوَرِ:</h1></div>
        <div class="designs-container">
            <div class="design-card" onclick="showGroup('بجايم')">
                <img src="https://i.postimg.cc/WzJWh6v9/3487897b-4d79-4e19-9ecc-699e36acf854.jpg">
                <div class="design-info"><span class="design-title">رسم بجايم</span></div>
            </div>
            <div class="design-card" onclick="showGroup('عائلي')">
                <img src="https://i.postimg.cc/Njj75kBF/e66c54c3-9a23-4281-816d-66e73b09ff33.jpg">
                <div class="design-info"><span class="design-title">رسم عائلي</span></div>
            </div>
            <div class="design-card" onclick="showGroup('زوجين')">
                <img src="https://i.postimg.cc/4dJ0dhLZ/a805f4ed-585a-4e34-a150-d2d41f133759.jpg">
                <div class="design-info"><span class="design-title">رسم زوجين</span></div>
            </div>
            <div class="design-card" onclick="showGroup('دعوات')">
                <img src="https://i.postimg.cc/vH2rp6wT/528f85b4-f291-426e-8513-a13f2c26efbb.jpg">
                <div class="design-info"><span class="design-title">رسم دعوات</span></div>
            </div>
            <div class="design-card" onclick="showGroup('فساتين')">
                <img src="https://i.postimg.cc/mr0QpxMg/1292e9c0-1a2b-4b72-81fc-4d38ffda675b.jpg">
                <div class="design-info"><span class="design-title">رسم فساتين</span></div>
            </div>
        </div>

        <div class="designs-header"><h1>تَصَامِيمُ الْفِيدْيُو:</h1></div>
        <div class="designs-container">
            <div class="design-card" onclick="showGroup('دعوات_فيديو')">
                <video muted loop playsinline autoplay>
                    <source src="رابط_فيديو_الغلاف.mp4" type="video/mp4">
                </video>
                <div class="design-info"><span class="design-title">تصميم دعوات الكتروني</span></div>
            </div>
        </div>

        <a href="index.html" class="back-home-link">اَلْعَوْدَةُ لِلرَّئِيسِيَّةِ</a>
    </div>

    <div id="groupPage" class="designs-section">
        <button class="back-btn" onclick="hideGroup()">← العودة للمعرض</button>
        <div class="designs-header">
            <h1 id="groupTitle">اسم القسم</h1>
        </div>
        <div id="groupContainer" class="designs-container">
            </div>
    </div>

    <div class="image-viewer-overlay" id="imgViewer" onclick="this.style.display='none'">
        <div id="mediaContainer"></div>
    </div>

    <script>
        const data = {
            'بجايم': { type: 'img', items: ['https://i.postimg.cc/WzJWh6v9/3487897b-4d79-4e19-9ecc-699e36acf854.jpg', 'https://i.postimg.cc/85dd3KTV/1a864f55-4c58-4056-a652-5db07cc2fa4e.jpg'] },
            'عائلي': { type: 'img', items: ['https://i.postimg.cc/Njj75kBF/e66c54c3-9a23-4281-816d-66e73b09ff33.jpg', 'https://i.postimg.cc/pXJ78Cjn/8589a603-a5d9-41c5-93f2-fa1dad7a4a14.jpg'] },
            'زوجين': { type: 'img', items: ['https://i.postimg.cc/4dJ0dhLZ/a805f4ed-585a-4e34-a150-d2d41f133759.jpg', 'https://i.postimg.cc/kGB48G1W/837a31e0-e688-4596-9cee-64f100a86c86.jpg'] },
            'دعوات': { type: 'img', items: ['https://i.postimg.cc/vH2rp6wT/528f85b4-f291-426e-8513-a13f2c26efbb.jpg', 'https://i.postimg.cc/85GMhRMr/131f4e4d-61cb-4102-b7a2-856b8089bec1.jpg'] },
            'فساتين': { type: 'img', items: ['https://i.postimg.cc/mr0QpxMg/1292e9c0-1a2b-4b72-81fc-4d38ffda675b.jpg'] },
            'دعوات_فيديو': { type: 'video', items: ['رابط_فيديو_1.mp4', 'رابط_فيديو_2.mp4'] }
        };

        function showGroup(category) {
            const main = document.getElementById('mainGallery');
            const groupPage = document.getElementById('groupPage');
            const container = document.getElementById('groupContainer');
            const title = document.getElementById('groupTitle');

            title.innerText = category.replace('_', ' ');
            container.innerHTML = '';
            
            data[category].items.forEach(src => {
                const card = document.createElement('div');
                card.className = 'design-card';
                card.onclick = (e) => { e.stopPropagation(); zoomMedia(src, data[category].type); };

                if (data[category].type === 'img') {
                    card.innerHTML = `<img src="${src}">`;
                } else {
                    card.innerHTML = `<video muted loop playsinline autoplay><source src="${src}"></video>`;
                }
                container.appendChild(card);
            });

            main.style.display = 'none';
            groupPage.style.display = 'flex';
            window.scrollTo(0, 0);
        }

        function hideGroup() {
            document.getElementById('mainGallery').style.display = 'flex';
            document.getElementById('groupPage').style.display = 'none';
        }

        function zoomMedia(src, type) {
            const viewer = document.getElementById('imgViewer');
            const container = document.getElementById('mediaContainer');
            container.innerHTML = '';

            if (type === 'img') {
                container.innerHTML = `<img src="${src}">`;
            } else {
                container.innerHTML = `<video controls autoplay><source src="${src}"></video>`;
            }
            viewer.style.display = 'flex';
        }
    </script>
</body>
</html>
