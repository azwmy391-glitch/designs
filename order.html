<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>طلب تصميم - متجر لمسة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .order-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, var(--white) 0%, var(--bg-color) 100%);
        }

        .welcome-card {
            background: var(--white);
            padding: 50px 40px;
            border-radius: 40px;
            box-shadow: 0 20px 50px rgba(74, 52, 39, 0.1);
            border: 2px solid var(--accent-pink);
            max-width: 600px;
            width: 100%;
            animation: popUpAnim 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .welcome-card h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.5rem;
            color: var(--primary-brown);
            margin-bottom: 15px;
            animation: fadeInUp 0.8s ease-out 0.3s both;
        }

        .welcome-card p {
            color: var(--text-discription);
            font-size: 1.2rem;
            margin-bottom: 35px;
            line-height: 1.8;
            animation: fadeInUp 0.8s ease-out 0.5s both;
        }

        /* التعديلات الجديدة على الزر */
        .whatsapp-order-btn {
            background-color: #25D366; 
            color: white;
            padding: 10px 25px; /* تصغير المربع ليكون قريباً من حجم الكلمة */
            border-radius: 50px;
            font-size: 0.95rem; /* ضبط الخط لضمان بقائه في سطر واحد */
            font-weight: 700;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(37, 211, 102, 0.3);
            animation: fadeInUp 0.8s ease-out 0.7s both, softPulse 2s infinite;
            white-space: nowrap; /* منع انقسام النص لسطرين */
        }

        /* تكبير أيقونة واتساب */
        .whatsapp-order-btn svg {
            width: 28px; 
            height: 28px;
        }

        .whatsapp-order-btn:hover {
            transform: scale(1.05) translateY(-3px);
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.5);
            background-color: #20ba5a;
        }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: var(--primary-brown);
            text-decoration: none;
            font-weight: bold;
            border-bottom: 2px solid var(--gold-subtle);
            animation: fadeIn 1s ease-out 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .floating-icons {
            position: absolute;
            font-size: 2rem;
            opacity: 0.2;
            z-index: -1;
            animation: float 6s infinite ease-in-out;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">متجر <span>لمسة</span></div>
    </nav>

    <div class="order-container">
        <div class="floating-icons" style="top: 20%; left: 10%;">✨</div>
        <div class="floating-icons" style="bottom: 20%; right: 10%;">🎨</div>
        <div class="floating-icons" style="top: 30%; right: 15%;">💎</div>

        <div class="welcome-card">
            <h1>مرحباً بك في متجر لمسة</h1>
            <p>يسعدنا جداً اهتمامك بالحصول على تصميم خاص. نحن هنا لنحول خيالك إلى واقع ينبض بالإبداع والجمال.</p>
            
            <a href="https://wa.me/966576968338" class="whatsapp-order-btn">
                <span>اطلب الآن عبر واتساب</span>

        </div>
    </div>

</body>
</html>
