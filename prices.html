<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الأسعار - متجر لمسة</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@400;700&family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        .pricing-section {
            padding: 60px 20px;
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pricing-header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease-out;
        }

        .pricing-header h1 {
            font-family: 'Reem Kufi', sans-serif;
            font-size: 2.8rem;
            color: var(--primary-brown);
            margin-bottom: 10px;
        }

        .pricing-header p {
            color: var(--text-discription);
            font-size: 1.1rem;
        }

        /* قائمة الأسعار الموحدة */
        .price-list-container {
            background: var(--white);
            width: 100%;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(74, 52, 39, 0.05);
            border: 2px solid var(--accent-pink);
            animation: fadeInUp 1s ease-out 0.3s both;
        }

        .price-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 10px;
            border-bottom: 1px dashed var(--accent-pink);
            transition: 0.3s;
        }

        .price-item:last-child {
            border-bottom: none;
        }

        .price-item:hover {
            background-color: var(--bg-color);
            transform: translateX(-5px);
        }

        .service-info {
            display: flex;
            flex-direction: column;
        }

        .service-name {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary-brown);
        }

        .service-note {
            font-size: 0.9rem;
            color: var(--text-discription);
        }

        .service-price {
            font-family: 'Cairo', sans-serif;
            font-weight: 900;
            font-size: 1.4rem;
            color: var(--gold-subtle);
            white-space: nowrap;
        }

        /* مربع طرق الدفع المعدل */
        .promo-box {
            margin-top: 30px;
            background: var(--accent-pink);
            color: var(--primary-brown);
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            text-align: center; /* نص في المنتصف */
            display: flex;
            flex-direction: column;
            align-items: center; /* المربع نفسه في المنتصف */
            justify-content: center;
            animation: bounceIn 1s ease-out 0.6s both, softPulse 2s infinite ease-in-out; /* أنيميشن الدخول والنبض المستمر */
            box-shadow: 0 5px 15px rgba(232, 211, 209, 0.4);
            line-height: 1.6;
        }

        /* أنيميشن النبض الخفيف المستمر */
        @keyframes softPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        /* معلومات التواصل السفلي */
        .footer-contact {
            margin-top: 40px;
            text-align: center;
            animation: fadeInUp 1s ease-out 0.9s both;
        }

        .back-home-link {
            margin-top: 30px;
            display: inline-block;
            color: var(--text-discription);
            text-decoration: none;
            border-bottom: 1px solid var(--gold-subtle);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">مَتْجَرُ <span>لَمْسَةٍ</span></div>
    </nav>

    <div class="pricing-section">
        <div class="pricing-header">
            <h1>زيدَي جمال مناسباتك بلمساتي</h1>
            <p>نصمم لكِ الجمال في كل تفصيلة</p>
        </div>

        <div class="price-list-container">
            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">تصميم صورة</span>
                </div>
                <div class="service-price">5﷼</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">تصميم الفيديو</span>
                </div>
                <div class="service-price">10﷼</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">رسم الفستانين وملابس هندي</span>
                </div>
                <div class="service-price">10﷼</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">تصميم فيديو مع الصورة</span>
                </div>
                <div class="service-price">15﷼</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">رسم عرسان</span>
                </div>
                <div class="service-price">20﷼</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">تصميم رسالة العمر</span>
                </div>
                <div class="service-price">حسب الطلب</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">لوحة توقيع</span>
                </div>
                <div class="service-price">حسب الطلب</div>
            </div>

            <div class="price-item">
                <div class="service-info">
                    <span class="service-name">تصميم فيديو 3D</span>
                </div>
                <div class="service-price">حسب الطلب</div>
            </div>
        </div>

        <div class="promo-box">
            طرق الدفع:
            <br>
            تحويل بنك
        </div>

        <div class="footer-contact">
            <a href="index.html" class="back-home-link">العودة للرئيسية</a>
        </div>
    </div>

</body>
</html>
